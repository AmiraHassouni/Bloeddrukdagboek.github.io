<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BloeddrukTracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf6f6;
    --card: #ffffff;
    --text: #1a0a0a;
    --muted: #7a5a5a;
    --bordeaux: #5c1a2e;
    --accent: #8b2635;
    --accent-light: #c0394a;
    --border: #f0dada;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #5c1a2e 0%, #8b2635 60%, #a83248 100%);
    color: white;
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
    border-bottom: 3px solid #c0394a;
  }
  .logo { font-family: 'DM Serif Display', serif; font-size: 1.8rem; }
  .logo span { color: #fca5a5; }
  .subtitle { font-size: 0.8rem; opacity: 0.75; margin-top: 3px; }
  .header-date { font-size: 0.85rem; opacity: 0.8; text-align: right; }

  main { max-width: 980px; margin: 0 auto; padding: 2rem 1rem; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
  @media(max-width: 640px) { .grid-2 { grid-template-columns: 1fr; } }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 1.5rem;
    border: 1px solid var(--border);
    box-shadow: 0 2px 12px rgba(92,26,46,0.06);
  }
  .card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.15rem;
    margin-bottom: 1.25rem;
    color: var(--bordeaux);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  @media(max-width: 480px) { .form-row { grid-template-columns: 1fr; } }

  .field label { display: block; font-size: 0.77rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.4rem; }
  .field input, .field textarea, .field select {
    width: 100%; padding: 0.65rem 0.9rem;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
    color: var(--text); background: #fff9f9;
    transition: border-color 0.2s, box-shadow 0.2s; outline: none;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    border-color: var(--accent); box-shadow: 0 0 0 3px rgba(139,38,53,0.12); background: white;
  }
  .field textarea { resize: vertical; min-height: 60px; }

  .btn {
    width: 100%; padding: 0.85rem;
    background: linear-gradient(135deg, var(--bordeaux), var(--accent));
    color: white; border: none; border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 600;
    cursor: pointer; transition: opacity 0.2s, transform 0.1s; margin-top: 0.5rem;
  }
  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.98); }
  .btn-sm { width: auto; padding: 0.4rem 0.9rem; font-size: 0.8rem; margin-top: 0; }
  .btn-outline { background: transparent; border: 1.5px solid var(--accent); color: var(--accent); }
  .btn-outline:hover { background: var(--accent); color: white; }
  .btn-danger { background: linear-gradient(135deg, #7f1d1d, #dc2626); }

  /* Feedback na opslaan */
  #feedback-box .fb-title { font-weight: 700; font-size: 1rem; margin-bottom: 0.3rem; }
  #feedback-box .fb-text  { font-size: 0.88rem; line-height: 1.55; }

  /* Stats */
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
  @media(max-width: 480px) { .stats-row { grid-template-columns: 1fr 1fr; } }
  .stat-card {
    background: linear-gradient(135deg, #5c1a2e, #8b2635);
    border-radius: 14px; padding: 1.1rem; text-align: center; color: white;
    box-shadow: 0 4px 14px rgba(92,26,46,0.2);
  }
  .stat-value { font-family: 'DM Serif Display', serif; font-size: 2rem; color: #fca5a5; }
  .stat-label { font-size: 0.72rem; opacity: 0.8; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }

  /* Tabel */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.87rem; table-layout: fixed; min-width: 680px; }
  th { text-align: left; padding: 0.6rem 0.7rem; color: var(--muted); font-weight: 600; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 2px solid var(--border); }
  td { padding: 0.7rem 0.7rem; border-bottom: 1px solid var(--border); vertical-align: middle; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  th:nth-child(1), td:nth-child(1) { width: 125px; }
  th:nth-child(2), td:nth-child(2) { width: 85px; text-align: center; }
  th:nth-child(3), td:nth-child(3) { width: 85px; text-align: center; }
  th:nth-child(4), td:nth-child(4) { width: 60px; text-align: center; }
  th:nth-child(5), td:nth-child(5) { width: 55px; text-align: center; }
  th:nth-child(6), td:nth-child(6) { white-space: normal; font-size: 0.8rem; color: var(--muted); }
  th:nth-child(7), td:nth-child(7) { width: 36px; text-align: center; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fff5f5; }
  .del-btn { background: none; border: none; cursor: pointer; color: #dc2626; font-size: 1rem; padding: 0.2rem 0.5rem; border-radius: 6px; }
  .del-btn:hover { background: #fee2e2; }

  .chart-wrap { position: relative; height: 220px; }
  .empty { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.9rem; }
  .actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }

  /* Patientnaam invoer */
  .naam-bar {
    background: white; border: 1px solid var(--border); border-radius: 12px;
    padding: 0.75rem 1rem; margin-bottom: 1.5rem;
    display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
  }
  .naam-bar label { font-size: 0.8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
  .naam-bar input { border: 1.5px solid var(--border); border-radius: 8px; padding: 0.45rem 0.8rem; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--text); background: #fff9f9; outline: none; flex: 1; min-width: 160px; }
  .naam-bar input:focus { border-color: var(--accent); }

  @keyframes fadeIn { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:translateY(0); } }

  /* PRINT */
  @media print {
    body { background: white; }
    header { background: #5c1a2e !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .no-print { display: none !important; }
    .card { break-inside: avoid; box-shadow: none; border: 1px solid #ddd; }
    .stat-card { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .s-goed  { background: #dcfce7 !important; color: #15803d !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .s-let-op{ background: #fef9c3 !important; color: #a16207 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .s-arts  { background: #fee2e2 !important; color: #b91c1c !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .s-crisis{ background: #450a0a !important; color: #fca5a5 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .print-header { display: block !important; }
    main { padding: 1rem; }
    .grid-2 { grid-template-columns: 1fr; }
  }

  .print-header {
    display: none;
    background: #fdf6f6; border: 1px solid var(--border);
    border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.5rem;
    font-size: 0.9rem; color: var(--muted);
  }
  .print-header strong { color: var(--text); font-size: 1rem; }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Bloeddruk<span>Tracker</span></div>
    <div class="subtitle">Persoonlijk overzicht voor uw arts</div>
  </div>
  <div style="display:flex;align-items:center;gap:1rem">
    <div style="font-size:2rem;opacity:0.3">♥</div>
    <div class="header-date" id="header-date"></div>
  </div>
</header>

<main>

  <!-- Naam van patiënt -->
  <div class="naam-bar no-print">
    <label>Naam patiënt</label>
    <input type="text" id="naam" placeholder="Vul uw naam in..." oninput="slaaNaamOp()">
  </div>

  <!-- Print header (alleen zichtbaar bij printen) -->
  <div class="print-header" id="print-header">
    <strong id="print-naam"></strong><br>
    Rapport gegenereerd op: <span id="print-datum"></span>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card"><div class="stat-value" id="stat-count">0</div><div class="stat-label">Metingen</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-sys">—</div><div class="stat-label">Gem. Systolisch</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-dia">—</div><div class="stat-label">Gem. Diastolisch</div></div>
  </div>

  <div class="grid-2">

    <!-- Invoer -->
    <div class="card no-print">
      <div class="card-title">🩺 Meting toevoegen</div>
      <div class="form-row">
        <div class="field">
          <label>Systolisch (mmHg)</label>
          <input type="number" id="sys" placeholder="bv. 120" min="60" max="250">
        </div>
        <div class="field">
          <label>Diastolisch (mmHg)</label>
          <input type="number" id="dia" placeholder="bv. 80" min="40" max="150">
        </div>
      </div>
      <div class="form-row">
        <div class="field">
          <label>Pols (slagen/min)</label>
          <input type="number" id="pols" placeholder="bv. 72" min="30" max="200">
        </div>
        <div class="field">
          <label>Datum & tijd</label>
          <input type="datetime-local" id="datum">
        </div>
      </div>
      <div class="field" style="margin-bottom:1rem">
        <label>Notitie (optioneel)</label>
        <textarea id="notitie" placeholder="bv. stress, medicatie genomen, na het sporten..."></textarea>
      </div>
      <div class="field" style="margin-bottom:0.75rem">
        <label>Arm</label>
        <select id="arm">
          <option value="Links">Links</option>
          <option value="Rechts" selected>Rechts</option>
        </select>
      </div>
      <button class="btn" onclick="voegToe()">♥ Meting opslaan</button>

    </div>

    <!-- Grafiek -->
    <div class="card">
      <div class="card-title">📈 Evolutie</div>
      <div class="chart-wrap"><canvas id="chart"></canvas></div>
      <div id="chart-empty" class="empty" style="display:none">Voeg metingen toe om de grafiek te zien.</div>
    </div>

  </div>

  <!-- Tabel -->
  <div class="card" style="margin-top:1.5rem">
    <div class="card-title">
      <span>📋 Overzicht metingen</span>
      <div class="actions no-print">
        <button class="btn btn-sm btn-outline" onclick="exportCSV()">⬇ Export CSV</button>
        <button class="btn btn-sm btn-outline" onclick="printRapport()">🖨 Afprinten / PDF</button>
        <button class="btn btn-sm btn-danger" onclick="verwijderAlles()">🗑 Wissen</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Datum & tijd</th>
            <th>Sys (mmHg)</th>
            <th>Dia (mmHg)</th>
            <th>Pols</th>
            <th>Arm</th>
            <th>Notitie</th>
            <th class="no-print"></th>
          </tr>
        </thead>
        <tbody id="tabel-body"></tbody>
      </table>
      <div id="tabel-empty" class="empty">Nog geen metingen ingevoerd.</div>
    </div>
  </div>

</main>

<script>
let metingen = JSON.parse(localStorage.getItem('bloeddruk_v3') || '[]');
let chart = null;

const now = new Date();
document.getElementById('datum').value = now.toISOString().slice(0,16);
document.getElementById('header-date').textContent = now.toLocaleDateString('nl-BE', {weekday:'long', year:'numeric', month:'long', day:'numeric'});

// Naam laden
const opgeslagenNaam = localStorage.getItem('bloeddruk_naam') || '';
document.getElementById('naam').value = opgeslagenNaam;

function slaaNaamOp() {
  localStorage.setItem('bloeddruk_naam', document.getElementById('naam').value);
}

function classificeer(sys, dia) {
  if (sys >= 180 || dia >= 110) return {
    label: '🔴 Raadpleeg onmiddellijk uw arts',
    badge: 's-crisis',
    fb: 'fb-crisis',
    advies: '⚠️ Uw bloeddruk is zeer hoog. Neem onmiddellijk contact op met uw arts of ga naar de spoeddienst.'
  };
  if (sys >= 140 || dia >= 90) return {
    label: '🔴 Raadpleeg uw arts',
    badge: 's-arts',
    fb: 'fb-arts',
    advies: 'Uw bloeddruk is hoog. Bespreek dit zo snel mogelijk met uw arts.'
  };
  if (sys >= 120 || dia >= 80) return {
    label: '🟡 Let op',
    badge: 's-let-op',
    fb: 'fb-letop',
    advies: 'Uw bloeddruk is licht verhoogd. Blijf dit goed opvolgen.'
  };
  return {
    label: '🟢 Goed',
    badge: 's-goed',
    fb: 'fb-goed',
    advies: '✓ Uw bloeddruk ziet er goed uit!'
  };
}

function voegToe() {
  const sys = parseInt(document.getElementById('sys').value);
  const dia = parseInt(document.getElementById('dia').value);
  const pols = document.getElementById('pols').value;
  const datum = document.getElementById('datum').value;
  const notitie = document.getElementById('notitie').value.trim();
  const arm = document.getElementById('arm').value;

  if (!sys || !dia || sys < 60 || dia < 40) { alert('Vul geldige waarden in.'); return; }

  const cl = classificeer(sys, dia);
  metingen.unshift({ sys, dia, pols: pols||'—', datum, notitie, arm, label: cl.label, badge: cl.badge });
  localStorage.setItem('bloeddruk_v3', JSON.stringify(metingen));



  document.getElementById('sys').value = '';
  document.getElementById('dia').value = '';
  document.getElementById('pols').value = '';
  document.getElementById('notitie').value = '';
  render();
}

function verwijder(i) {
  if (confirm('Meting verwijderen?')) { metingen.splice(i,1); localStorage.setItem('bloeddruk_v3', JSON.stringify(metingen)); render(); }
}

function verwijderAlles() {
  if (confirm('Alle metingen wissen?')) { metingen=[]; localStorage.setItem('bloeddruk_v3', JSON.stringify(metingen)); render(); }
}

function exportCSV() {
  if (!metingen.length) { alert('Geen metingen om te exporteren.'); return; }
  const naam = document.getElementById('naam').value || 'onbekend';
  const rows = metingen.map(m => `"${m.datum}","${m.sys}","${m.dia}","${m.pols}","${m.arm}","${m.notitie||''}"`);
  const csv = [`Patiënt: ${naam}`, `Gegenereerd op: ${new Date().toLocaleDateString('nl-BE')}`, '', 'Datum,Systolisch,Diastolisch,Pols,Arm,Notitie', ...rows].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv;charset=utf-8;'}));
  a.download = `bloeddruk_${naam.replace(/\s/g,'_')}.csv`;
  a.click();
}

function printRapport() {
  const naam = document.getElementById('naam').value || '(naam niet ingevuld)';
  document.getElementById('print-naam').textContent = 'Patiënt: ' + naam;
  document.getElementById('print-datum').textContent = new Date().toLocaleDateString('nl-BE', {year:'numeric',month:'long',day:'numeric'});
  window.print();
}

function render() {
  document.getElementById('stat-count').textContent = metingen.length;
  if (metingen.length > 0) {
    document.getElementById('stat-sys').textContent = Math.round(metingen.reduce((s,m)=>s+m.sys,0)/metingen.length);
    document.getElementById('stat-dia').textContent = Math.round(metingen.reduce((s,m)=>s+m.dia,0)/metingen.length);
  } else {
    document.getElementById('stat-sys').textContent = '—';
    document.getElementById('stat-dia').textContent = '—';
  }

  const tbody = document.getElementById('tabel-body');
  tbody.innerHTML = '';
  document.getElementById('tabel-empty').style.display = metingen.length===0 ? 'block':'none';

  metingen.forEach((m,i) => {
    const d = new Date(m.datum);
    const ds = d.toLocaleDateString('nl-BE') + ' ' + d.toLocaleTimeString('nl-BE',{hour:'2-digit',minute:'2-digit'});
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${ds}</td>
      <td><strong>${m.sys}</strong></td>
      <td><strong>${m.dia}</strong></td>
      <td>${m.pols}</td>
      <td>${m.arm}</td>
      <td>${m.notitie||'—'}</td>
      <td class="no-print"><button class="del-btn" onclick="verwijder(${i})">✕</button></td>`;
    tbody.appendChild(tr);
  });

  const chrono = [...metingen].reverse().slice(-20);
  document.getElementById('chart-empty').style.display = metingen.length===0 ? 'block':'none';
  if (chart) chart.destroy();
  if (metingen.length > 0) {
    chart = new Chart(document.getElementById('chart').getContext('2d'), {
      type: 'line',
      data: {
        labels: chrono.map(m=>new Date(m.datum).toLocaleDateString('nl-BE',{day:'2-digit',month:'2-digit'})),
        datasets: [
          { label:'Systolisch', data:chrono.map(m=>m.sys), borderColor:'#8b2635', backgroundColor:'rgba(139,38,53,0.08)', borderWidth:2.5, pointBackgroundColor:'#8b2635', pointRadius:4, tension:0.35, fill:true },
          { label:'Diastolisch', data:chrono.map(m=>m.dia), borderColor:'#c0394a', backgroundColor:'rgba(192,57,74,0.05)', borderWidth:2, pointBackgroundColor:'#c0394a', pointRadius:4, tension:0.35, fill:true }
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins:{
          legend:{position:'bottom', labels:{font:{family:'DM Sans',size:11}, boxWidth:12}},
          tooltip:{mode:'index', intersect:false},
          annotation: {}
        },
        scales:{
          y:{ min:50, grid:{color:'rgba(92,26,46,0.06)'}, ticks:{font:{family:'DM Sans',size:11}} },
          x:{ grid:{display:false}, ticks:{font:{family:'DM Sans',size:10}} }
        }
      }
    });
  }
}

render();
</script>
</body>
</html>
